# =============================================================================
# MICROSERVICIO INVENTARIO - Legacy Pharmacy
# =============================================================================

# ==============================================================
# SERVIDOR
# ==============================================================
server.port=8081
server.servlet.context-path=/api/v1/inventario
# ==============================================================
# APLICACION
# ==============================================================
spring.application.name=ms-inventario

# ==============================================================
# BASE DE DATOS MySQL
# ==============================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/legacy_pharmacy_inventory?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Bogota}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Pool de conexiones Hikari
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=InventarioHikariPool

# ==============================================================
# JPA / HIBERNATE
# ==============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql
spring.sql.init.continue-on-error=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ==============================================================
# ACTUATOR
# ==============================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ==============================================================
# LOGGING
# ==============================================================
logging.level.root=INFO
logging.level.com.legacy.pharmacy.inventario=DEBUG

# ==============================================================
# SEGURIDAD JWT (Sincronizada con Usuarios y Gateway)
# ==============================================================
jwt.secret=${JWT_SECRET:your_jwt_secret_here_for_local_dev}
jwt.expiration=86400000