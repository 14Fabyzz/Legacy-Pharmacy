# Application Name
spring.application.name=ms-usuarios

# Server Port
server.port=8082

# Database Configuration - Con variables de entorno para Docker
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/legacy_pharmacy_usuarios?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:secret}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration - Con variable de entorno para Docker
jwt.secret=${JWT_SECRET:your_jwt_secret_here_for_local_dev}
jwt.expiration=86400000



# Logging
logging.level.root=INFO
logging.level.com.legacy.usuarios=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Error Handling
spring.web.error.include-message=always
spring.web.error.include-binding-errors=always

# Data Initialization
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true