<div class="login-container">
  <div class="login-box">

    <div class="login-header">
      <!-- Icono/Logo -->
      <div class="brand-container">
        <img src="assets/logo.png" alt="Regen Salud POS Logo" class="brand-logo-image">
      </div>
      <h2>Bienvenido de nuevo</h2>
      <p>Inicia sesión para gestionar tu farmacia</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onLogin()">

      <!-- Mensaje de error si existe -->
      <div *ngIf="loginError" class="login-error-message">
        {{ loginError }}
      </div>

      <div class="form-group">
        <label>Correo electrónico</label>
        <div class="input-icon-wrapper">
          <i class="fa-regular fa-envelope input-icon"></i>
          <input type="text" class="form-control with-icon" placeholder="ejemplo@regensalud.com"
            formControlName="username">
        </div>
      </div>

      <div class="form-group">
        <div class="label-row">
          <label>Contraseña</label>
          <a href="javascript:void(0)" class="forgot-password">¿Olvidaste tu contraseña?</a>
        </div>
        <div class="password-container input-icon-wrapper">
          <i class="fa-solid fa-lock input-icon"></i>
          <input [type]="showPassword ? 'text' : 'password'" class="form-control with-icon-password"
            placeholder="••••••••" formControlName="password">
          <button type="button" class="btn-toggle-password" (click)="togglePasswordVisibility()"
            aria-label="Mostrar u ocultar contraseña">
            <i [class]="showPassword ? 'fa-regular fa-eye-slash' : 'fa-regular fa-eye'"></i>
          </button>
        </div>
      </div>

      <!-- Eliminada la sección de "Olvidaste tu contraseña" -->

      <button type="submit" class="btn-login" [disabled]="loginForm.invalid">
        Iniciar Sesión <i class="fa-solid fa-arrow-right btn-icon"></i>
      </button>

    </form>
  </div>
</div>
