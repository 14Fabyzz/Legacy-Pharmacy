<div class="login-container">
  <div class="login-box">

    <div class="login-header">
      <!-- Icono/Logo -->
      <div class="brand-container">
        <img src="assets/logo.png" alt="Regen Salud POS Logo" class="brand-logo-image">
      </div>
      <h2>Bienvenido de nuevo</h2>
      <p>Ingrese sus credenciales para acceder al panel de control.</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onLogin()">

      <!-- Mensaje de error si existe -->
      <div *ngIf="loginError" class="login-error-message">
        {{ loginError }}
      </div>

      <div class="form-group">
        <label>Nombre de Usuario o Correo Electrónico</label>
        <input type="text" class="form-control" placeholder="Ej. empleado" formControlName="username">
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <div class="password-container">
          <input [type]="showPassword ? 'text' : 'password'" class="form-control" placeholder="••••••••••"
            formControlName="password">
          <button type="button" class="btn-toggle-password" (click)="togglePasswordVisibility()"
            aria-label="Mostrar u ocultar contraseña">
            <i [class]="showPassword ? 'fa-regular fa-eye-slash' : 'fa-regular fa-eye'"></i>
          </button>
        </div>
      </div>

      <!-- Eliminada la sección de "Olvidaste tu contraseña" -->

      <button type="submit" class="btn-login" [disabled]="loginForm.invalid">
        Iniciar Sesión
      </button>

    </form>
  </div>
</div>
