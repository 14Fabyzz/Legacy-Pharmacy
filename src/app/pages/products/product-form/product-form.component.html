<div class="page-container">
  <header class="page-header">
    <h2 *ngIf="!isEditMode">NUEVO PRODUCTO</h2>
    <h2 *ngIf="isEditMode">ACTUALIZAR PRODUCTO</h2>
    <p>Registre la ficha técnica del medicamento. El stock y los lotes se gestionan en el módulo de "Compras".</p>
  </header>

  <nav class="tabs-nav">
    <a routerLink="/app/productos/almacen" routerLinkActive="active">
      <span class="nav-icon">📦</span> ALMACÉN
    </a>

    <a routerLink="/app/productos/consulta" routerLinkActive="active">
      <span class="nav-icon">🔍</span> CONSULTA
    </a>

    <a routerLink="/app/productos/vencimientos" routerLinkActive="active">
      <span class="nav-icon">🚨</span> MONITOR ALERTAS
    </a>

    <a routerLink="/app/productos/entrada-mercancia" routerLinkActive="active">
      <span class="nav-icon">🚚</span> ENTRADAS
    </a>

    <a routerLink="/app/productos/auditoria" routerLinkActive="active">
      <span class="nav-icon">📋</span> AUDITORÍA
    </a>

    <a routerLink="/app/productos/nuevo" routerLinkActive="active">
      <span class="nav-icon">✨</span> NUEVO
    </a>
  </nav>

  <form [formGroup]="productForm" (ngSubmit)="submitForm()" class="product-form">

    <!-- SECCIÓN 1: Identificación -->
    <fieldset class="form-section">
      <legend>Identificación</legend>
      <div class="form-row">
        <div class="form-group">
          <label>Código Interno / SKU *</label>
          <input type="text" formControlName="codigoInterno" placeholder="Ej: DOLEX-500">
        </div>
        <div class="form-group">
          <label>Código de Barras</label>
          <div class="input-with-icon">
            <input type="text" formControlName="codigoBarras" #barcodeInput (change)="validateBarcode()"
              (keyup.enter)="validateBarcode()">
            <button type="button" class="btn-icon-inside" (click)="focusBarcodeInput()" title="Escanear">
              <span class="icon-barcode">|||</span>
            </button>
          </div>
        </div>
        <div class="form-group full-width">
          <label>Nombre Comercial *</label>
          <input type="text" formControlName="nombreComercial" placeholder="Ej: Dolex Forte">
        </div>
      </div>
    </fieldset>

    <!-- SECCIÓN 2: Datos Farmacéuticos -->
    <fieldset class="form-section">
      <legend>Detalles Farmacéuticos</legend>
      <div class="form-row">
        <div class="form-group">
          <label>Principio Activo *</label>
          <select formControlName="principioActivoId">
            <option [ngValue]="null">Seleccione...</option>
            <option *ngFor="let pa of principiosActivos" [ngValue]="pa.id">{{ pa.nombre }}</option>
          </select>
        </div>
        <div class="form-group">
          <label>Laboratorio *</label>
          <select formControlName="laboratorioId">
            <option [ngValue]="null">Seleccione...</option>
            <option *ngFor="let lab of laboratorios" [ngValue]="lab.id">{{ lab.nombre }}</option>
          </select>
        </div>
        <div class="form-group">
          <label>Categoría *</label>
          <select formControlName="categoriaId">
            <option [ngValue]="null">Seleccione...</option>
            <option *ngFor="let cat of categorias" [ngValue]="cat.id">{{ cat.nombre }}</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Concentración</label>
          <input type="text" formControlName="concentracion" placeholder="Ej: 500mg">
        </div>
        <div class="form-group">
          <label>Presentación</label>
          <input type="text" formControlName="presentacion" placeholder="Ej: Caja x 10 Tabletas">
        </div>
        <div class="form-group">
          <label>Registro INVIMA</label>
          <input type="text" formControlName="registroInvima">
        </div>
      </div>
    </fieldset>

    <!-- SECCIÓN 3: Comercial y Control -->
    <fieldset class="form-section">
      <legend>Comercial y Control</legend>
      <div class="form-row">
        <div class="form-group">
          <label>Precio Venta Base ($) *</label>
          <input type="number" formControlName="precioVentaBase">
        </div>
        <div class="form-group">
          <label>IVA (%)</label>
          <input type="number" formControlName="ivaPorcentaje">
        </div>
        <div class="form-group">
          <label>Stock Mínimo (Alerta)</label>
          <input type="number" formControlName="stockMinimo">
        </div>
      </div>

      <div class="form-row checkboxes-row">
        <div class="checkbox-group">
          <input type="checkbox" id="es_controlado" formControlName="esControlado">
          <label for="es_controlado">Es Medicamento Controlado</label>
        </div>
        <div class="checkbox-group">
          <input type="checkbox" id="refrigerado" formControlName="refrigerado">
          <label for="refrigerado">Requiere Refrigeración</label>
        </div>
      </div>
    </fieldset>

    <div class="form-actions">
      <button type="button" class="btn btn-secondary" (click)="limpiarFormulario()">Limpiar</button>
      <button type="submit" class="btn btn-primary" [disabled]="productForm.invalid">
        {{ isEditMode ? 'Actualizar Ficha' : 'Crear Ficha Técnica' }}
      </button>
    </div>
  </form>
</div>
