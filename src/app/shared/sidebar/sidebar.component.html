<div class="sidebar-container">
  <!-- Cabecera: Logo + Perfil de usuario -->
  <div class="sidebar-header">
    <!-- Logo institucional -->
    <div class="brand-wrap">
      <img src="assets/logo.png" alt="Logo empresa" class="brand-logo">
    </div>
    <!-- Divider -->
    <div class="header-divider"></div>
    <!-- Perfil del usuario -->
    <div class="user-profile" *ngIf="currentUser$ | async as user">
      <div class="user-avatar">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
          <path fill-rule="evenodd"
            d="M7.5 6a4.5 4.5 0 119 0 4.5 4.5 0 01-9 0zM3.751 20.105a8.25 8.25 0 0116.498 0 .75.75 0 01-.437.695A18.683 18.683 0 0112 22.5c-2.786 0-5.433-.608-7.812-1.7a.75.75 0 01-.437-.695z"
            clip-rule="evenodd" />
        </svg>
      </div>
      <div class="user-info">
        <span class="user-name">{{ user.nombreCompleto }}</span>
        <span class="user-role">{{ user.rolNombre || user.rol }}</span>
      </div>
    </div>
  </div>

  <nav class="menu">
    <ul>
      <li *ngFor="let item of menuItems" routerLinkActive="active-menu-item" [routerLinkActiveOptions]="{exact: false}">

        <a [routerLink]="item.subMenu && item.subMenu.length > 0 ? null : item.path" (click)="toggleSubMenu(item)"
          [class.active-link]="item.active">

          <span>{{ item.title }}</span>
          <span class="arrow" *ngIf="item.subMenu && item.subMenu.length > 0"></span>
        </a>

        <ul class="sub-menu" *ngIf="item.active && item.subMenu && item.subMenu.length > 0">
          <li *ngFor="let subItem of item.subMenu" routerLinkActive="active-submenu-item"
            [routerLinkActiveOptions]="{exact: true}">

            <a [routerLink]="subItem.path">
              <span>{{ subItem.title }}</span>
            </a>
          </li>
        </ul>

      </li>
    </ul>
  </nav>

  <!-- Pie de página: Cerrar sesión -->
  <div class="sidebar-footer">
    <button class="logout-btn" (click)="logout()">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="logout-icon">
        <path fill-rule="evenodd"
          d="M7.5 3.75A1.5 1.5 0 006 5.25v13.5a1.5 1.5 0 001.5 1.5h6a1.5 1.5 0 001.5-1.5V15a.75.75 0 011.5 0v3.75a3 3 0 01-3 3h-6a3 3 0 01-3-3V5.25a3 3 0 013-3h6a3 3 0 013 3V9A.75.75 0 0115 9V5.25a1.5 1.5 0 00-1.5-1.5h-6zm10.72 4.72a.75.75 0 011.06 0l3 3a.75.75 0 010 1.06l-3 3a.75.75 0 11-1.06-1.06l1.72-1.72H9a.75.75 0 010-1.5h10.94l-1.72-1.72a.75.75 0 010-1.06z"
          clip-rule="evenodd" />
      </svg>
      <span>Cerrar sesión</span>
    </button>
  </div>
</div>
