<div class="sidebar-container">
  <!-- Se muestra el usuario logueado O el usuario por defecto -->
  <div class="user-profile" *ngIf="(currentUser$ | async) || defaultUser as user">
    <div class="user-avatar">
      <!-- Using SVG icon since assets/avatar-placeholder.png is missing -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"
        style="width: 28px; height: 28px; color: #cbd5e1;">
        <path fill-rule="evenodd"
          d="M7.5 6a4.5 4.5 0 119 0 4.5 4.5 0 01-9 0zM3.751 20.105a8.25 8.25 0 0116.498 0 .75.75 0 01-.437.695A18.683 18.683 0 0112 22.5c-2.786 0-5.433-.608-7.812-1.7a.75.75 0 01-.437-.695z"
          clip-rule="evenodd" />
      </svg>
    </div>
    <div class="user-info">
      <!-- Fallbacks para nombre y rol -->
      <h3>{{ user.nombreCompleto || 'Usuario de Prueba' }}</h3>
      <p class="user-role">{{ user.rolNombre || 'INVITADO' }}</p>
    </div>
  </div>

  <nav class="menu">
    <ul>
      <li *ngFor="let item of menuItems" routerLinkActive="active-menu-item" [routerLinkActiveOptions]="{exact: false}">

        <a [routerLink]="item.subMenu && item.subMenu.length > 0 ? null : item.path" (click)="toggleSubMenu(item)"
          [class.active-link]="item.active">

          <span>{{ item.title }}</span>
          <span class="arrow" *ngIf="item.subMenu && item.subMenu.length > 0"></span>
        </a>

        <ul class="sub-menu" *ngIf="item.active && item.subMenu && item.subMenu.length > 0">
          <li *ngFor="let subItem of item.subMenu" routerLinkActive="active-submenu-item"
            [routerLinkActiveOptions]="{exact: true}">

            <a [routerLink]="subItem.path">
              <span>{{ subItem.title }}</span>
            </a>
          </li>
        </ul>

      </li>
    </ul>
  </nav>
</div>
